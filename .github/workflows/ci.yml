name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install ruff (lint)
        run: python -m pip install ruff

      - name: Run ruff lint
        run: |
          echo 'Running ruff...'
          ruff check .

      - name: Run llm smoke tests for subprojects
        run: |
          set -e
          # For each subproject, create a local venv at .venv, install its requirements
          for sp in barebones_starter full_agentic_build; do
            if [ -f "$sp/requirements.txt" ]; then
              python -m venv "$sp/.venv"
              # shellcheck disable=SC1091
              . "$sp/.venv/bin/activate"
              pip install --upgrade pip
              pip install -r "$sp/requirements.txt"
              # run the smoke test which is safe when OPENAI_API_KEY is not set (it will skip remote calls)
              python scripts/llm_smoke.py --subproject "$sp"
            else
              echo "No requirements.txt for $sp; skipping venv setup"
            fi
          done

  version-guard:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify VERSION matches tag on HEAD (warning only)
        run: |
          set -u
          if [ ! -f VERSION ]; then
            echo "WARNING: VERSION file is missing."
            exit 0
          fi
          version=$(cat VERSION | tr -d '[:space:]')
          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "WARNING: VERSION must be semver (e.g., 0.1.0). Got: $version"
            exit 0
          fi
          expected_tag="v${version}"
          head_tags=$(git tag --points-at HEAD)
          if echo "$head_tags" | grep -qx "$expected_tag"; then
            echo "VERSION matches HEAD tag $expected_tag."
            exit 0
          fi
          echo "WARNING: Expected tag $expected_tag on HEAD, but found: ${head_tags:-<none>}"
          exit 0
